<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclutamiento Creadores UGC</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .container {
            background: #111111;
            padding: 40px;
            border-radius: 8px;
            /* Efecto de borde y sombra neón suave */
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.15);
            width: 100%;
            max-width: 450px;
            border: 1px solid #1a1a1a;
        }

        h2 {
            text-align: center;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            margin-bottom: 35px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #b3b3b3;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #ffffff;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* Efecto al hacer clic en el campo de texto */
        input:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
            background: #222;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            font-weight: bold;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Efecto al pasar el mouse por el botón */
        button:hover {
            background: #00ffcc;
            color: #000000;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Postulación Creador UGC</h2>
    
    <form action="https://formspree.io/f/xnjgvgvy" method="POST">
        
        <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
        </div>

        <div class="form-group">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" required placeholder="tu@correo.com">
        </div>

        <div class="form-group">
            <label for="telefono">Número de contacto</label>
            <input type="tel" id="telefono" name="telefono" required placeholder="+54 999 999 999">
        </div>

        <div class="form-group">
            <label for="portafolio">Enlace a tu portafolio (Drive, TikTok, IG)</label>
            <input type="url" id="portafolio" name="portafolio" required placeholder="https://...">
        </div>

        <button type="submit">Enviar perfil</button>
    </form>
</div>

</body>
</html>
