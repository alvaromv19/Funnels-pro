<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendá tu llamada | Creamos Negocios</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,600;0,800;1,600&display=swap" rel="stylesheet">
    <link rel="dns-prefetch" href="https://links.creamosnegociosrentables.com">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #010308; /* Fondo oscuro puro minimalista */
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenido Principal */
        .content {
            width: 100%;
            max-width: 1000px; /* Un poco más ancho para que el calendario respire bien */
            padding: 30px 20px 60px; 
            text-align: center;
            position: relative; 
            z-index: 1;
            flex: 1; /* Permite que el footer baje si hay poco contenido */
        }

        /* Logo */
        .content img.logo {
            max-width: 140px;
            height: auto;
            margin-bottom: 25px; 
        }

        /* EL GLOW DE FONDO (Mantenemos el Azul Premium) */
        .bg-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 70%;
            background: rgba(34, 116, 242, 0.20); 
            filter: blur(100px);
            z-index: -1;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Tipografía del Titular */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
        }

        /* ANIMACIÓN: Brillo continuo en el texto naranja */
        .text-orange { 
            color: #f25522; 
            background: linear-gradient(90deg, #f25522 0%, #ffad91 40%, #f25522 80%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shineText 4s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        /* Contenedor del Calendario (El toque Pro) */
        .calendar-box {
            width: 100%;
            background: #ffffff; /* Fondo blanco para que el widget se fusione */
            border-radius: 12px; 
            overflow: hidden; /* Recorta el iframe para que herede los bordes curvos */
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            margin: 0 auto;
            transition: all 0.3s ease;
            /* Altura mínima para evitar que colapse antes de cargar el script */
            min-height: 500px; 
        }

        /* Responsividad Móvil */
        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; margin-bottom: 20px; }
            .content { padding: 20px 15px 40px; } 
            .content img.logo { max-width: 120px; margin-bottom: 20px; }
            .calendar-box { border-radius: 8px; }
        }

        /* --- FOOTER MINIMALISTA --- */
        .footer {
            width: 100%;
            padding: 25px 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            margin-top: auto; 
        }
        
        .footer p {
            font-size: 0.75rem;
            color: #4a5568; 
            margin: 5px 0;
            font-weight: 300;
        }
        
        .footer a {
            color: #4a5568;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer a:hover {
            color: #8892b0;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="bg-glow"></div>
        
        <img src="presentacion/assets/logo-cn.png" alt="Creamos Negocios" class="logo">
        
        <h1>Agendá tu llamada para adquirir un<br><span class="text-orange">negocio digital validado</span></h1>
        
        <div class="calendar-box">
            <iframe src="https://links.creamosnegociosrentables.com/widget/booking/TZyEhDjxHnH0clscir98" style="width: 100%; border:none; overflow: hidden;" scrolling="no" id="TZyEhDjxHnH0clscir98_1774670911013"></iframe>
            <script src="https://links.creamosnegociosrentables.com/js/form_embed.js" type="text/javascript"></script>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Creamos Negocios. Todos los derechos reservados.</p>
        <p>
            <a href="#">Términos y Condiciones</a> | 
            <a href="#">Políticas de Privacidad</a> | 
            <a href="#">Aviso Legal</a>
        </p>
    </footer>

</body>
</html>
